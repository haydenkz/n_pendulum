[base]
env_name = n_pendulum

[vec]
total_agents = 4096
num_buffers = 2
num_threads = 16

[env]
num_links = 7
cart_mass = 1.0
link_mass = 0.1
link_length = 0.5
gravity = 9.8
force_mag = 8.622977087274194
dt = 0.02
min_episode_steps = 1000
max_episode_steps = 2000
upright_reset_prob = 0.38920166390016675
upright_angle_noise = 0.034932828396558764
upright_vel_noise = 0.02436711547896266

[policy]
hidden_size = 100
num_layers = 4
expansion_factor = 1

[torch]
network = MinGRU
encoder = DefaultEncoder
decoder = DefaultDecoder

[train]
gpus = 1
seed = 42
total_timesteps = 100000000000
learning_rate = 0.00065
anneal_lr = 1
min_lr_ratio = 0
gamma = 0.995
gae_lambda = 0.95
replay_ratio = 1
clip_coef = 0.10
vf_coef = 0.25
vf_clip_coef = 1.0
max_grad_norm = 0.5
ent_coef = 0.0015
beta1 = 0.9
beta2 = 0.999
eps = 1e-8
minibatch_size = 32768
horizon = 128
vtrace_rho_clip = 1.0
vtrace_c_clip = 1.0
prio_alpha = 0.5
prio_beta0 = 0.5

[sweep]
method = Protein
metric = hold_time
metric_distribution = linear
goal = maximize
max_suggestion_cost = 450
max_runs = 16
gpus = 1
downsample = 5
use_gpu = True
prune_pareto = True
early_stop_quantile = 0.3
sweep_only = total_timesteps,hidden_size,num_layers,upright_reset_prob,upright_angle_noise,upright_vel_noise,force_mag,learning_rate,ent_coef
match_enemy_model_path = {}
match_num_games = {}
match_enemy_hidden_size = {}
match_enemy_num_layers = {}

[sweep.match_enemy_hidden_size.ignore]
dummy = 0

[sweep.match_enemy_num_layers.ignore]
dummy = 0

[match_enemy_hidden_size]

[match_enemy_num_layers]

[sweep.train.total_timesteps]
distribution = log_normal
min = 5e8
max = 3e9
scale = time

[sweep.policy.hidden_size]
distribution = uniform_pow2
min = 64
max = 256
scale = auto

[sweep.policy.num_layers]
distribution = int_uniform
min = 2
max = 6
scale = auto

[sweep.env.upright_reset_prob]
distribution = uniform
min = 0.0
max = 0.5
scale = auto

[sweep.env.upright_angle_noise]
distribution = uniform
min = 0.025
max = 0.055
scale = auto

[sweep.env.upright_vel_noise]
distribution = uniform
min = 0.02
max = 0.055
scale = auto

[sweep.env.force_mag]
distribution = uniform
min = 8.5
max = 10.5
scale = auto

[sweep.train.learning_rate]
distribution = log_normal
min = 0.0005
max = 0.002
scale = 0.35

[sweep.train.ent_coef]
distribution = log_normal
min = 0.001
max = 0.0025
scale = auto
