[base]
env_name = n_pendulum

[vec]
total_agents = 4096
num_buffers = 2
num_threads = 16

[env]
num_links = 6
cart_mass = 1.0
link_mass = 0.1
link_length = 0.7565952808070149
gravity = 9.8
force_mag = 8.621807161498612
dt = 0.02
min_episode_steps = 500
max_episode_steps = 2000
upright_reset_prob = 0.464798728682683
upright_angle_noise = 0.04424879908813739
upright_vel_noise = 0.020134070896522523
delta_scale = 4.0
stable_height = 0.85
stable_vel = 2.5
hold_ramp_steps = 200.0
stable_bonus = 0.08208514437741138
hold_bonus = 0.17647183303120875

[policy]
hidden_size = 224
num_layers = 4
expansion_factor = 1

[torch]
network = MinGRU
encoder = DefaultEncoder
decoder = DefaultDecoder

[train]
gpus = 1
seed = 42
total_timesteps = 100000000000
learning_rate = 0.0008
anneal_lr = 1
min_lr_ratio = 0
gamma = 0.995
gae_lambda = 0.95
replay_ratio = 1
clip_coef = 0.10
vf_coef = 0.25
vf_clip_coef = 1.0
max_grad_norm = 0.5
ent_coef = 0.0010
beta1 = 0.9
beta2 = 0.999
eps = 1e-8
minibatch_size = 16384
horizon = 128
vtrace_rho_clip = 1.0
vtrace_c_clip = 1.0
prio_alpha = 0.5
prio_beta0 = 0.5

[sweep]
method = Protein
metric = hold_time
metric_distribution = linear
goal = maximize
max_suggestion_cost = 450
max_runs = 16
gpus = 1
downsample = 5
use_gpu = True
prune_pareto = True
early_stop_quantile = 0.3
sweep_only = hidden_size,num_layers
match_enemy_model_path = {}
match_num_games = {}
match_enemy_hidden_size = {}
match_enemy_num_layers = {}

[sweep.match_enemy_hidden_size.ignore]
dummy = 0

[sweep.match_enemy_num_layers.ignore]
dummy = 0

[match_enemy_hidden_size]

[match_enemy_num_layers]

[sweep.train.total_timesteps]
distribution = uniform
min = 100000000
max = 100000000
scale = time

[sweep.policy.hidden_size]
distribution = int_uniform
min = 198
max = 234
scale = auto

[sweep.policy.num_layers]
distribution = int_uniform
min = 1
max = 6
scale = auto

[sweep.env.upright_reset_prob]
distribution = uniform
min = 0.0
max = 0.5
scale = auto

[sweep.env.link_length]
distribution = uniform
min = 0.6
max = 0.9
scale = auto

[sweep.env.upright_angle_noise]
distribution = uniform
min = 0.025
max = 0.055
scale = auto

[sweep.env.upright_vel_noise]
distribution = uniform
min = 0.02
max = 0.055
scale = auto

[sweep.env.force_mag]
distribution = uniform
min = 8.5
max = 10.5
scale = auto

[sweep.env.delta_scale]
distribution = uniform
min = 4.0
max = 12.0
scale = auto

[sweep.env.stable_height]
distribution = uniform
min = 0.85
max = 0.95
scale = auto

[sweep.env.stable_vel]
distribution = uniform
min = 1.0
max = 2.5
scale = auto

[sweep.env.hold_ramp_steps]
distribution = uniform
min = 50
max = 200
scale = auto

[sweep.env.stable_bonus]
distribution = uniform
min = 0.03
max = 0.12
scale = auto

[sweep.env.hold_bonus]
distribution = uniform
min = 0.08
max = 0.30
scale = auto

[sweep.train.learning_rate]
distribution = log_normal
min = 0.0005
max = 0.002
scale = 0.35

[sweep.train.ent_coef]
distribution = log_normal
min = 0.001
max = 0.0025
scale = auto
